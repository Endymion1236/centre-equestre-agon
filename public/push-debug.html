<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Test Push</title></head>
<body>
<h2>Diagnostic Push</h2>
<div id="out" style="font-family:monospace;font-size:13px;white-space:pre-wrap"></div>
<script>
const log = (msg) => { document.getElementById('out').textContent += msg + '\n'; };

async function run() {
  log('Navigator: ' + navigator.userAgent.slice(0,80));
  log('');
  
  // 1. Support
  log('serviceWorker: ' + ('serviceWorker' in navigator ? '✅' : '❌'));
  log('Notification: ' + ('Notification' in window ? '✅' : '❌'));
  log('PushManager: ' + ('PushManager' in window ? '✅' : '❌'));
  log('');
  
  // 2. Permission actuelle
  log('Permission actuelle: ' + Notification.permission);
  log('');
  
  // 3. SW enregistrés
  const regs = await navigator.serviceWorker.getRegistrations();
  log('SW enregistrés: ' + regs.length);
  regs.forEach(r => log('  scope: ' + r.scope + ' state: ' + (r.active?.state || '?')));
  log('');
  
  // 4. Tester showNotification directement
  if (Notification.permission === 'granted') {
    const reg = await navigator.serviceWorker.getRegistration('/');
    if (reg) {
      log('Test showNotification via SW...');
      await reg.showNotification('🐴 Test direct', { body: 'Si tu vois ça, le SW marche !', icon: '/icons/icon-192x192.png' });
      log('showNotification appelé ✅');
    } else {
      log('❌ Aucun SW trouvé sur /');
    }
  }
}
run().catch(e => log('ERREUR: ' + e.message));
</script>
</body>
</html>
